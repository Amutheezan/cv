<!-- Colour palette picker + dark/light toggle.
     Uses html[data-theme] and html[data-color-theme] to mirror the blog's approach. -->
<script>
(function () {
  var PALETTES = [
    { key: 'blue',    color: '#60a5fa', label: 'Blue (default)' },
    { key: 'indigo',  color: '#818cf8', label: 'Indigo' },
    { key: 'purple',  color: '#c084fc', label: 'Purple' },
    { key: 'magenta', color: '#e879f9', label: 'Magenta' },
    { key: 'cyan',    color: '#22d3ee', label: 'Cyan' }
  ];

  // SVG icons for the dark/light toggle
  var SUN_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  var MOON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

  // ── Helpers ──────────────────────────────────────────────────────────────

  function getSavedTheme() {
    try { return localStorage.getItem('resume-color-theme') || 'blue'; } catch (e) { return 'blue'; }
  }

  function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }

  function setDarkMode(dark) {
    var html = document.documentElement;
    if (dark) {
      html.setAttribute('data-theme', 'dark');
      // Keep body.dark in sync so the base theme's own CSS rules still apply
      document.body.classList.add('dark');
      try { localStorage.setItem('resume-dark-mode', 'dark'); } catch (e) {}
    } else {
      html.removeAttribute('data-theme');
      document.body.classList.remove('dark');
      try { localStorage.setItem('resume-dark-mode', 'light'); } catch (e) {}
    }
  }

  function applyTheme(key) {
    var html = document.documentElement;
    if (key === 'blue') {
      html.removeAttribute('data-color-theme');
    } else {
      html.setAttribute('data-color-theme', key);
    }
    try { localStorage.setItem('resume-color-theme', key); } catch (e) {}
    updateSwatches(key);
  }

  function updateSwatches(activeKey) {
    var swatches = document.querySelectorAll('.resume-color-swatch');
    for (var i = 0; i < swatches.length; i++) {
      var active = swatches[i].getAttribute('data-theme') === activeKey;
      if (active) { swatches[i].classList.add('active'); }
      else { swatches[i].classList.remove('active'); }
    }
  }

  function updateToggleBtn(btn) {
    var dark = isDark();
    btn.innerHTML = dark ? SUN_SVG : MOON_SVG;
    btn.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
    btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  // ── Builder ───────────────────────────────────────────────────────────────

  function buildPicker() {
    var picker = document.createElement('div');
    picker.className = 'resume-color-picker';
    picker.setAttribute('aria-label', 'Theme controls');

    // Colour swatches (blue / green / purple)
    for (var i = 0; i < PALETTES.length; i++) {
      var p = PALETTES[i];
      var btn = document.createElement('button');
      btn.className = 'resume-color-swatch';
      btn.setAttribute('data-theme', p.key);
      btn.setAttribute('title', p.label);
      btn.style.background = p.color;
      btn.addEventListener('click', (function (key) {
        return function () { applyTheme(key); };
      })(p.key));
      picker.appendChild(btn);
    }

    // Thin vertical separator
    var sep = document.createElement('div');
    sep.className = 'resume-picker-sep';
    sep.setAttribute('aria-hidden', 'true');
    picker.appendChild(sep);

    // Dark / light toggle
    var toggleBtn = document.createElement('button');
    toggleBtn.className = 'resume-dark-toggle';
    updateToggleBtn(toggleBtn);
    toggleBtn.addEventListener('click', function () {
      setDarkMode(!isDark());
      updateToggleBtn(toggleBtn);
    });
    picker.appendChild(toggleBtn);

    document.body.appendChild(picker);

    // Sync swatches to saved colour theme
    updateSwatches(getSavedTheme());

    // Sync body.dark with the data-theme attribute set by <head> init
    if (isDark()) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildPicker);
  } else {
    buildPicker();
  }
})();
</script>
