<!-- Theme + dark-mode no-flicker init: runs before first paint to prevent flash.
     Uses data attributes to match the blog's html[data-theme] / html[data-color-theme] approach. -->
<script>
(function () {
  try {
    // Restore colour theme — purge any legacy values (green, indigo, magenta)
    // so stale localStorage entries don't bleed old tints into the page.
    var VALID_THEMES = { purple: 1, cyan: 1 };
    var ct = localStorage.getItem('resume-color-theme');
    if (ct && !VALID_THEMES[ct]) {
      localStorage.removeItem('resume-color-theme');
      ct = null;
    }
    if (ct) {
      document.documentElement.setAttribute('data-color-theme', ct);
    }

    // Restore dark/light preference via data-theme attribute (matches blog).
    // Default: dark (consistent with previous darkmode: true config).
    var dm = localStorage.getItem('resume-dark-mode');
    if (dm !== 'light') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  } catch (e) {}
})();
</script>
